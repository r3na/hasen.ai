<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="50%" stop-color="#B0E0E6"/>
      <stop offset="60%" stop-color="#90EE90"/>
      <stop offset="100%" stop-color="#228B22"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="120" rx="80" ry="40" fill="white" opacity="0.85"/>
  <ellipse cx="250" cy="110" rx="60" ry="35" fill="white" opacity="0.85"/>
  <ellipse cx="900" cy="90" rx="90" ry="45" fill="white" opacity="0.8"/>
  <ellipse cx="960" cy="80" rx="65" ry="35" fill="white" opacity="0.8"/>
  <!-- Ground -->
  <rect x="0" y="380" width="1200" height="250" fill="#5FAD5F"/>
  <rect x="0" y="360" width="1200" height="40" fill="#7CCD7C" opacity="0.7"/>
  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="Comic Sans MS, cursive, sans-serif" font-size="120" font-weight="bold" fill="#8B4513" stroke="#654321" stroke-width="3">HASEN</text>
  <text x="600" y="260" text-anchor="middle" font-family="Comic Sans MS, cursive, sans-serif" font-size="36" fill="#654321">Das hungrige Häschen Spiel</text>
  <!-- Rabbit emoji -->
  <text x="600" y="450" text-anchor="middle" font-size="150">🐰</text>
  <!-- Carrot emoji -->
  <text x="420" y="520" text-anchor="middle" font-size="60">🥕</text>
  <text x="780" y="520" text-anchor="middle" font-size="60">🥕</text>
  <!-- Bird emoji -->
  <text x="950" y="300" text-anchor="middle" font-size="60">🐦</text>
  <!-- Tagline -->
  <text x="600" y="590" text-anchor="middle" font-family="Comic Sans MS, cursive, sans-serif" font-size="28" fill="white">hasen.ai</text>
</svg>
